name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PWMCP_DEBUG: '1'
  PWDEBUGIMPL: '1'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - name: Ensure no changes
      run: git diff --exit-code

  # Fast non-browser tests: cli.spec.ts and library.spec.ts exercise the CLI
  # binary and the Node.js library import without launching any browser.
  # Running Ubuntu-only with no `playwright install` step keeps this job < 2 min.
  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Run fast (non-browser) tests
      run: npm run test-fast --workspace=packages/playwright-mcp

  # Browser tests: all specs that launch a real browser via the MCP server.
  # Runs across all three OS targets to catch platform-specific regressions.
  test-browser:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Playwright install
      run: npx playwright install --with-deps
    - name: Build
      run: npm run build
    - name: Run browser tests
      id: test-browser
      run: npm run test-browser --workspace=packages/playwright-mcp
      continue-on-error: true
    - name: Run extension tests
      id: test-extension
      if: matrix.os == 'macos-15'
      run: npm run test --workspace=packages/extension
      continue-on-error: true
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.os }}
        path: packages/playwright-mcp/playwright-report/
        retention-days: 14
        if-no-files-found: ignore
    - name: Check test results
      if: steps.test-browser.outcome == 'failure' || steps.test-extension.outcome == 'failure'
      run: exit 1

  test_mcp_docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Playwright install
      run: npx playwright install --with-deps chromium
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        tags: playwright-mcp-dev:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true
    - name: Run tests
      shell: bash
      run: |
        # Used for the Docker tests to share the test-results folder with the container.
        umask 0000
        npm run test -- --project=chromium-docker
      working-directory: ./packages/playwright-mcp
      env:
        MCP_IN_DOCKER: 1
    - name: Upload Docker test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-docker
        path: packages/playwright-mcp/playwright-report/
        retention-days: 14
        if-no-files-found: ignore
